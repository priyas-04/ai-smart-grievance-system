services:
  # Web Service
  - type: web
    name: resolveai-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    healthCheckPath: /health
    
  # PostgreSQL Database
  - type: pserv
    name: resolveai-db
    env: postgres
    plan: free
    
environment:
  - key: DATABASE_URL
    fromDatabase:
      name: resolveai-db
      property: connectionString
  - key: SECRET_KEY
    value: your-super-secret-production-key-change-this-1714454000
  - key: ALGORITHM
    value: HS256
  - key: ACCESS_TOKEN_EXPIRE_MINUTES
    value: "60"
