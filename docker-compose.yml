version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: resolveai_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: resolveai_db
      MYSQL_USER: resolveai_user
      MYSQL_PASSWORD: resolveai_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - resolveai_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resolveai_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://resolveai_user:resolveai_password@mysql:3306/resolveai_db
      SECRET_KEY: your-super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    volumes:
      - ./backend:/app
    networks:
      - resolveai_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resolveai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - resolveai_network

volumes:
  mysql_data:

networks:
  resolveai_network:
    driver: bridge
