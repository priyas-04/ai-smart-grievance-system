<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f7fa;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ResolveAI Dashboard Test</h1>
        <div class="stats" id="stats">
            <div class="stat-card">
                <h3>Total Complaints</h3>
                <div class="stat-value" id="total-complaints">Loading...</div>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <div class="stat-value" id="pending">Loading...</div>
            </div>
            <div class="stat-card">
                <h3>In Progress</h3>
                <div class="stat-value" id="in-progress">Loading...</div>
            </div>
            <div class="stat-card">
                <h3>Resolved</h3>
                <div class="stat-value" id="resolved">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchDashboardStats() {
            try {
                const response = await fetch('http://localhost:8001/api/complaints/stats/dashboard', {
                    headers: {
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbkByZXNvbHZlYWkuY29tIiwicm9sZSI6ImFkbWluIiwiZXhwIjoxNzc0NzgyMzAxfQ.yHGgtST348yBdPb4rFn8-ZCjw7Lx4J-0OwKMe'
                    }
                });
                const data = await response.json();
                
                document.getElementById('total-complaints').textContent = data.total_complaints || 0;
                document.getElementById('pending').textContent = data.pending || 0;
                document.getElementById('in-progress').textContent = data.in_progress || 0;
                document.getElementById('resolved').textContent = data.resolved || 0;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('stats').innerHTML = '<p style="color: red;">Error loading dashboard: ' + error.message + '</p>';
            }
        }

        // Load stats when page loads
        fetchDashboardStats();
    </script>
</body>
</html>
